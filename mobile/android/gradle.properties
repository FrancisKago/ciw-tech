org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true
android.useAndroidX=true
# Désactive le cache incrémental Kotlin : le projet (D:) et le cache pub (C:) sont sur
# des disques différents, ce que le cache incrémental Kotlin ne gère pas (erreurs
# "different roots"). Off = plus de bruit d'erreurs + rebuilds fiables.
kotlin.incremental=false
